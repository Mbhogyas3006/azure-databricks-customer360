name: CI — Customer 360 Pipeline Tests

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    name: PySpark unit tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Set up Java 11 (required for PySpark)
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '11'

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Generate synthetic test data
        run: python data/generate_synthetic_data.py

      - name: Run unit tests with coverage
        run: |
          pytest tests/ -v --tb=short \
            --cov=notebooks \
            --cov-report=term-missing \
            --cov-report=xml
        env:
          PYSPARK_PYTHON: python
          JAVA_HOME: ${{ env.JAVA_HOME }}

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: coverage.xml

  lint:
    name: Code quality check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install linting tools
        run: pip install flake8

      - name: Lint notebooks and tests
        run: |
          flake8 notebooks/ tests/ data/ \
            --max-line-length=120 \
            --ignore=E501,W503,E302,E303 \
            --exclude=__pycache__
